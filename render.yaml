services:
  - type: web
    name: wireframe-to-excel
    env: python
    buildCommand: |
      apt-get update && apt-get install -y chromium-driver
      pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CHROMIUM_PATH
        value: /usr/bin/chromium
